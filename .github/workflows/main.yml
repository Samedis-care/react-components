name: CI

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

# Only allow one pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: NPM Cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit Tests
        run: npm run test:unit
      - name: Build library
        run: npm run build
      - name: Publish dist
        run: |
          set -x
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          commit_message="Release build based on commit $(git rev-parse --short HEAD) from $(git show -s --format=%ci)"
          git fetch
          mkdir ../build_out
          mv package.json package-lock.json dist LICENSE ../build_out
          git checkout -f master_dist || git checkout --orphan master_dist
          rm -f .gitignore
          git rm -rf .
          mv ../build_out/* .
          rmdir ../build_out
          git add package.json package-lock.json dist LICENSE
          git status
          git commit -m "$commit_message" && git push -f origin master_dist || echo "No changes"

  deploy-pages:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: NPM Cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install Dependencies
        run: npm ci
      - name: Build Storybook
        run: npx storybook build -o gh-pages/storybook
      - name: Build TypeDoc
        run: npm run docgen && mv typedoc gh-pages/typedoc
      - name: Create index page
        run: |
          cat > gh-pages/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>components-care</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              a { display: block; padding: 16px 24px; margin: 12px 0; background: #f5f5f5; border-radius: 8px; text-decoration: none; color: #1976d2; font-size: 18px; }
              a:hover { background: #e3f2fd; }
              h1 { color: #333; }
            </style>
          </head>
          <body>
            <h1>components-care</h1>
            <a href="storybook/">Storybook — Component Library</a>
            <a href="typedoc/">TypeDoc — API Documentation</a>
          </body>
          </html>
          HTMLEOF
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
